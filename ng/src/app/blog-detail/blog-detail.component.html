<div *ngIf="entry">
  <header>
    <h2 class="h1">{{ entry.title }}</h2>

    <p class="text-sm mt-4 mb-2"><i class="bi bi-clock me-2"></i>{{ entry.date | date:'yyyy年M月d日 HH時mm分' }}</p>

    <p><i class="bi bi-tag-fill"></i><span class="text-mnemonic text-sm border border-mnemonic rounded ms-2 px-2 py-1" *ngFor="let tag of entry.tags">{{ tag }}</span></p>
  </header>

  <section>
    <div class="mb-5">
      <ngx-twitter-tweet *ngFor="let tweetId of entry.tweetIds" [tweetID]="tweetId" [options]="{ lang: 'ja', layout: 'responsive' }"></ngx-twitter-tweet>
    </div>

    <markdown lineNumbers [data]="entry.body"></markdown>
  </section>

  <div class="d-flex flex-wrap mt-5">
    <div *ngIf="entry.previous" class="text-sm"><a [routerLink]="['/blog', entry.previous.id]"><i class="bi bi-chevron-double-left me-2"></i>{{ entry.previous.title }}</a></div>
    <div *ngIf="entry.next" class="text-sm text-end ms-auto"><a [routerLink]="['/blog', entry.next.id]">{{ entry.next.title }}<i class="bi bi-chevron-double-right ms-2"></i></a></div>
  </div>
</div>
