<div class="logoAndNav position-fixed start-0 end-0 top-0 bg-mnemonic w-100">
  <div class="container position-relative mx-auto">
    <div class="logomark position-absolute">
      <a routerLink="/"><img class="border border-secondary w-100 h-auto" src="/images/logo.png" alt="ニモニク" /></a>
    </div>

    <nav>
      <ul class="d-flex align-items-center mb-0">
        <li><a routerLink="/">HOME</a></li>
        <li><a routerLink="/about">弊社について</a></li>
        <!-- li><a routerLink="/works">実績紹介</a></li -->
        <li><a routerLink="/blog">技術ブログ</a></li>
        <li><a routerLink="/inquiry">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</div>

<div class="contentBody" [ngClass]="{ isHome: isHome }">
  <header>
    <div class="container mx-auto">
      <h1 class="headding text-zinc m-0">株式会社ニーモニック</h1>
    </div>
  </header>

  <div class="mainContainer container mx-auto">
    <div class="mainContainerInner">
      <div class="d-flex h-100">
        <aside role="complementary">
          <div class="mt-5">
            <ins class="adsbygoogle" style="display: block;" data-ad-client="ca-pub-4887705385405786" data-ad-slot="1560402219" data-ad-format="auto" data-full-width-responsive="true"></ins>
            
            <div appGoogleAdsense ad-id="mini-skyscraper"></div>
          </div>
        </aside>

        <main role="main">
          <article>
            <router-outlet (activate)="onActivate($event)"></router-outlet>
          </article>
        </main>
      </div>

      <footer>
        <div class="text-zinc mx-auto py-2">
          <address>&copy; 2014-{{ currentYear }} Mnemonic Co., Ltd. Some Rights Reserved.</address>
        </div>
      </footer>
    </div>
  </div>
</div>

<div class="toastWrapper">
  <ngb-toast *ngFor="let toast of toastService.toasts" [class]="toast.classname" [autohide]="true" [delay]="toast.delay || 3000" (hidden)="toastService.remove(toast)">{{ toast.body }}</ngb-toast>
</div>
