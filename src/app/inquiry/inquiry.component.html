<section>
  <h2>思い立ったが吉日。まずは気軽にお問い合わせを</h2>

  <p>「この案件、ニーモニックに依頼したいかも」と思ったら、以下のフォームよりお問い合わせください。質問は大歓迎ですが、セールスの類は間に合っておりますので、あらかじめご遠慮いただけると助かります。</p>
</section>

<section>
  <form style="max-width: 800px;" [formGroup]="inquiryForm" (ngSubmit)="submit()">
    <div class="row mb-2">
      <label class="col-sm-2 col-form-label fw-semibold">お名前</label>

      <div class="col-sm-5">
        <input type="text" class="form-control" [ngClass]="{ 'is-invalid': errors.name }" formControlName="name" />

        <div class="invalid-feedback">{{ errors.name }}</div>
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-sm-2 col-form-label fw-semibold">お電話番号</div>

      <div class="col-sm-5">
        <input type="tel" class="form-control" [ngClass]="{ 'is-invalid': errors.phone }" formControlName="phone" />

        <div class="invalid-feedback">{{ errors.phone }}</div>
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-sm-2 col-form-label fw-semibold">メールアドレス</div>

      <div class="col-sm-5">
        <input type="email" [ngClass]="{ 'is-invalid': errors.email }" class="form-control"formControlName="email" />

        <div class="invalid-feedback">{{ errors.email }}</div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-sm-2 col-form-label fw-semibold">メッセージ</div>

      <div class="col-sm-10">
        <textarea rows="5" class="form-control" [ngClass]="{ 'is-invalid': errors.body }" formControlName="body"></textarea>
  
        <div class="invalid-feedback">{{ errors.body }}</div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6 offset-sm-2"><button type="submit" class="btn btn-mnemonic">送信</button></div>
    </div>
  </form>
</section>
